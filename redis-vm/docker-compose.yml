services:
  # redis-1 VM에서 실행: docker compose --profile master up -d
  redis-master:
    image: redis:7-alpine
    container_name: redis
    profiles: ["master"]
    ports:
      - "6379:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      default:
        aliases: [redis]
    restart: unless-stopped

  # redis-2, redis-3 VM에서 실행: docker compose --profile replica up -d
  redis-replica:
    image: redis:7-alpine
    container_name: redis
    profiles: ["replica"]
    ports:
      - "6379:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --replicaof ${REDIS_MASTER_HOST} 6379
      --masterauth ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      default:
        aliases: [redis]
    restart: unless-stopped

  # 3개 VM 모두 실행 (쿼럼: 2/3)
  sentinel:
    image: redis:7-alpine
    container_name: sentinel
    ports:
      - "26379:26379"
    command: >
      sh -c "
        printf 'bind 0.0.0.0\nprotected-mode no\nsentinel monitor mymaster ${REDIS_MASTER_HOST} 6379 2\nsentinel auth-pass mymaster ${REDIS_PASSWORD}\nsentinel down-after-milliseconds mymaster 5000\nsentinel failover-timeout mymaster 60000\nsentinel parallel-syncs mymaster 1\nsentinel announce-ip ${SENTINEL_HOST}\nsentinel announce-port 26379\n' > /tmp/sentinel.conf &&
        redis-sentinel /tmp/sentinel.conf
      "
    restart: unless-stopped

  # redis-1 VM에서만 실행 (--profile master 에 포함)
  redis-insight:
    image: redislabs/redisinsight:latest
    container_name: redis-insight
    profiles: ["master"]
    ports:
      - "8001:8001"
    restart: unless-stopped

  # Prometheus용 Redis 메트릭 노출 (master/replica 모두 실행)
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis-exporter
    profiles: ["master", "replica"]
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped

  portainer-agent:
    image: portainer/agent:latest
    container_name: portainer-agent
    ports:
      - "9001:9001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  redis-data:
